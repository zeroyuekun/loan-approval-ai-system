apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: loan-approval
resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - backend/hpa.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - celery/worker-ml.yaml
  - celery/worker-io.yaml
  - celery/beat.yaml
  - backend/pdb.yaml
  - celery/pdb-ml.yaml
  - celery/pdb-io.yaml
  - network-policy.yaml
  - ingress.yaml
commonLabels:
  app.kubernetes.io/part-of: aussieloanai

# Image tag pinning — CI must override these with the real SHA before deploying.
# Usage:  kustomize edit set image \
#           ghcr.io/OWNER/loan-approval-ai-system/backend=ghcr.io/OWNER/loan-approval-ai-system/backend:$GIT_SHA
#          kustomize edit set image \
#           ghcr.io/OWNER/loan-approval-ai-system/frontend=ghcr.io/OWNER/loan-approval-ai-system/frontend:$GIT_SHA
# The deployment files keep `:latest` as a human-readable fallback reference;
# kustomize replaces the tag at render time using the entries below.
images:
  - name: ghcr.io/OWNER/loan-approval-ai-system/backend
    # REPLACE_WITH_GIT_SHA — set by CI via: kustomize edit set image ...=...:$GIT_SHA
    newTag: "REPLACE_WITH_GIT_SHA"
  - name: ghcr.io/OWNER/loan-approval-ai-system/frontend
    # REPLACE_WITH_GIT_SHA — set by CI via: kustomize edit set image ...=...:$GIT_SHA
    newTag: "REPLACE_WITH_GIT_SHA"
