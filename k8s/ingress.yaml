apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loan-approval-ingress
  namespace: loan-approval
  labels:
    app.kubernetes.io/name: loan-approval
    app.kubernetes.io/part-of: aussieloanai
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.aussieloanai.com.au
      secretName: loan-approval-tls
  rules:
    - host: app.aussieloanai.com.au
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
