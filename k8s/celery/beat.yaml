apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: loan-approval
  labels:
    app.kubernetes.io/name: celery-beat
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: aussieloanai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: celery-beat
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: celery-beat
        app.kubernetes.io/component: scheduler
        app.kubernetes.io/part-of: aussieloanai
    spec:
      containers:
        - name: celery-beat
          image: ghcr.io/OWNER/loan-approval-ai-system/backend:latest
          command:
            - celery
            - -A
            - config
            - beat
            - -l
            - info
          envFrom:
            - configMapRef:
                name: loan-approval-config
            - secretRef:
                name: loan-approval-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 200m
