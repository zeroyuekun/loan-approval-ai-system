global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'django-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 10s
    http_headers:
      X-Health-Token:
        values:
          - ${HEALTH_CHECK_TOKEN}

  # TODO: Redis does not expose Prometheus metrics natively; scraping :6379
  # produces TCP errors every interval. Add oliver006/redis_exporter:9121 as a
  # sidecar or monitoring-profile service, then restore this job pointing at
  # redis_exporter:9121 instead of redis:6379.
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis_exporter:9121']

  - job_name: 'celery-exporter'
    static_configs:
      - targets: ['celery-exporter:9808']
    scrape_interval: 10s

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 10s
