global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'django-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 10s
    http_headers:
      X-Health-Token:
        values:
          - ${HEALTH_CHECK_TOKEN}

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'celery-exporter'
    static_configs:
      - targets: ['celery-exporter:9808']
    scrape_interval: 10s

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 10s
