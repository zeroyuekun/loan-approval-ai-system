global:
  resolve_timeout: 5m

route:
  receiver: default-webhook
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: default-webhook
      group_wait: 10s
    - match:
        severity: warning
      receiver: default-webhook
      group_wait: 5m

inhibit_rules:
  - source_matchers:
      - alertname = HealthCheckFailing
    target_matchers:
      - alertname = HighErrorRate
    equal: ['instance']

receivers:
  - name: default-webhook
    webhook_configs:
      - url: 'http://localhost:9095/webhook'
        send_resolved: true
