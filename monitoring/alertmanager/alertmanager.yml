global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-webhook'
  routes:
    - match:
        severity: critical
      receiver: 'critical-webhook'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'default-webhook'
      group_wait: 30s
      repeat_interval: 4h

receivers:
  - name: 'default-webhook'
    webhook_configs:
      - url: 'http://alertmanager-webhook:9095/webhook'
        send_resolved: true
  - name: 'critical-webhook'
    webhook_configs:
      - url: 'http://alertmanager-webhook:9095/webhook'
        send_resolved: true

inhibit_rules:
  - source_match:
      alertname: HealthCheckFailing
    target_match:
      alertname: HighErrorRate
    equal: ['instance']
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
