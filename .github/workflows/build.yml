name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Force Node.js 24 runtime for all JS actions (gitleaks@v2 has no native Node 24 version)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -t loan-backend ./backend

      - name: Build frontend image
        run: docker build -t loan-frontend ./frontend

      - name: Trivy scan backend image
        # Pinned to v0.35.0 commit SHA — trivy-action was supply-chain compromised
        # on 2026-03-19 (GHSA-69fq-xp46-6x23). Never use @master or mutable tags.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: loan-backend
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: loan-frontend
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore

  dast-scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    # Only run on main branch pushes (not on every PR — ZAP is slow)
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v5

      - name: Start application stack
        run: |
          docker compose build backend
          docker compose up -d db redis
          echo "Waiting for db and redis..."
          sleep 10
          docker compose up -d backend
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/api/v1/health/ > /dev/null 2>&1; then
              echo "Backend is healthy"
              exit 0
            fi
            if ! docker compose ps backend --format '{{.State}}' | grep -q running; then
              echo "Backend container crashed. Logs:"
              docker compose logs backend --tail 80
              exit 1
            fi
            echo "Waiting for backend... ($i/40)"
            sleep 5
          done
          echo "Backend did not become ready. Logs:"
          docker compose logs backend --tail 80
          exit 1
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: 'true'
          DJANGO_SETTINGS_MODULE: config.settings.development
          ALLOWED_HOSTS: '*'
          POSTGRES_DB: loan_approval
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          REDIS_PASSWORD: testpass
          FIELD_ENCRYPTION_KEY: "kA6H1LGRC3JUszuqLoXUyvxw_IX5bjJSDJ6B57rdexU="
          ANTHROPIC_API_KEY: sk-ant-test-key

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25  # v0.15.0
        with:
          target: 'http://localhost:8000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

      - name: Stop application stack
        if: always()
        run: docker compose down -v

  load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v5

      - name: Start application stack
        run: |
          docker compose build backend
          docker compose up -d db redis
          echo "Waiting for db and redis..."
          sleep 10
          docker compose up -d backend
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/api/v1/health/ready/ > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            if ! docker compose ps backend --format '{{.State}}' | grep -q running; then
              echo "Backend container crashed. Logs:"
              docker compose logs backend --tail 80
              exit 1
            fi
            echo "Waiting for backend... ($i/40)"
            sleep 5
          done
          echo "Backend did not become ready. Logs:"
          docker compose logs backend --tail 80
          exit 1
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: 'true'
          DJANGO_SETTINGS_MODULE: config.settings.development
          ALLOWED_HOSTS: '*'
          POSTGRES_DB: loan_approval
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          REDIS_PASSWORD: testpass
          FIELD_ENCRYPTION_KEY: "kA6H1LGRC3JUszuqLoXUyvxw_IX5bjJSDJ6B57rdexU="
          ANTHROPIC_API_KEY: sk-ant-test-key

      - name: Seed test data
        run: |
          docker compose exec -T backend python manage.py migrate --noinput
          docker compose exec -T backend python manage.py shell -c "
          from apps.accounts.models import CustomUser
          if not CustomUser.objects.filter(username='admin').exists():
              CustomUser.objects.create_superuser('admin', 'admin@test.com', 'admin123', role='admin')
          "

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run k6 smoke test
        run: |
          mkdir -p tests/load/results
          k6 run tests/load/pipeline_load_test.js \
            --env BASE_URL=http://localhost:8000 \
            --env TEST_USERNAME=admin \
            --env TEST_PASSWORD=admin123 \
            -e K6_NO_USAGE_REPORT=true \
            --out json=tests/load/results/k6-output.json \
            --duration 30s --vus 5
        continue-on-error: true

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: load-test-results
          path: tests/load/results/
          retention-days: 30

      - name: Stop application stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [docker-build, dast-scan]
    # Relies on branch-protection rules to require green Lint / Test / Security
    # workflow conclusions before a push reaches master. See
    # docs/runbooks/ci-deployment.md for the required-checks list.
    if: always() && github.ref == 'refs/heads/master' && github.event_name == 'push' && !contains(needs.docker-build.result, 'failure') && !contains(needs.dast-scan.result, 'failure')
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
