name: email-preview-e2e

on:
  pull_request:
    paths:
      - 'backend/apps/email_engine/services/html_renderer.py'
      - 'frontend/src/lib/emailHtmlRenderer.ts'
      - 'backend/tests/fixtures/email_**'
      - 'frontend/src/__tests__/fixtures/email_**'
      - 'frontend/e2e/email-preview.spec.ts'
      - 'frontend/e2e/email-preview.spec.ts-snapshots/**'
      - '.github/workflows/email-preview-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci
      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      - name: Run Playwright email-preview suite
        run: |
          cd frontend
          npx playwright test email-preview
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Upload Playwright results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7
