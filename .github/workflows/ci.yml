name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: loan_approval_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_DEBUG: "True"
      POSTGRES_DB: loan_approval_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://localhost:6379/0
      FIELD_ENCRYPTION_KEY: "kA6H1LGRC3JUszuqLoXUyvxw_IX5bjJSDJ6B57rdexU="
      ANTHROPIC_API_KEY: sk-ant-test-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest-cov

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short --cov=apps --cov-report=term-missing --cov-fail-under=60

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install linters
        run: pip install ruff

      - name: Lint with Ruff
        working-directory: backend
        run: ruff check .

      - name: Format check with Ruff
        working-directory: backend
        run: ruff format --check .

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install security tools
        run: pip install bandit
      - name: Bandit SAST scan (Python)
        run: |
          bandit -r backend/apps/ -f json -o bandit-report.json --severity-level high
          bandit -r backend/apps/ --severity-level high -f screen
      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 30

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --desc on
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t loan-backend ./backend

      - name: Build frontend image
        run: docker build -t loan-frontend ./frontend

  dast-scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    # Only run on main branch pushes (not on every PR — ZAP is slow)
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Start application stack
        run: |
          docker compose build
          docker compose up -d
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/api/v1/health/ > /dev/null 2>&1; then
              echo "Backend is healthy"
              exit 0
            fi
            if ! docker compose ps backend --format '{{.State}}' | grep -q running; then
              echo "Backend container crashed. Logs:"
              docker compose logs backend --tail 50
              exit 1
            fi
            echo "Waiting for backend... ($i/40)"
            sleep 5
          done
          echo "Backend did not become healthy. Logs:"
          docker compose logs backend --tail 50
          exit 1
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: 'true'
          DJANGO_SETTINGS_MODULE: config.settings.development
          ALLOWED_HOSTS: '*'
          POSTGRES_DB: loan_approval
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          REDIS_PASSWORD: testpass
          FIELD_ENCRYPTION_KEY: "kA6H1LGRC3JUszuqLoXUyvxw_IX5bjJSDJ6B57rdexU="
          ANTHROPIC_API_KEY: sk-ant-test-key

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

      - name: Stop application stack
        if: always()
        run: docker compose down -v

  load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Start application stack
        run: |
          docker compose build
          docker compose up -d
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/api/v1/health/ready/ > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            if ! docker compose ps backend --format '{{.State}}' | grep -q running; then
              echo "Backend container crashed. Logs:"
              docker compose logs backend --tail 50
              exit 1
            fi
            echo "Waiting for backend... ($i/40)"
            sleep 5
          done
          echo "Backend did not become ready. Logs:"
          docker compose logs backend --tail 50
          exit 1
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: 'true'
          DJANGO_SETTINGS_MODULE: config.settings.development
          ALLOWED_HOSTS: '*'
          POSTGRES_DB: loan_approval
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          REDIS_PASSWORD: testpass
          FIELD_ENCRYPTION_KEY: "kA6H1LGRC3JUszuqLoXUyvxw_IX5bjJSDJ6B57rdexU="
          ANTHROPIC_API_KEY: sk-ant-test-key

      - name: Seed test data
        run: |
          docker compose exec -T backend python manage.py migrate --noinput
          docker compose exec -T backend python manage.py shell -c "
          from apps.accounts.models import CustomUser
          if not CustomUser.objects.filter(username='admin').exists():
              CustomUser.objects.create_superuser('admin', 'admin@test.com', 'admin123', role='admin')
          "

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run k6 smoke test
        run: |
          mkdir -p tests/load/results
          k6 run tests/load/pipeline_load_test.js \
            --env BASE_URL=http://localhost:8000 \
            --env TEST_USERNAME=admin \
            --env TEST_PASSWORD=admin123 \
            -e K6_NO_USAGE_REPORT=true \
            --out json=tests/load/results/k6-output.json \
            --duration 30s --vus 5
        continue-on-error: true

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: tests/load/results/
          retention-days: 30

      - name: Stop application stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint, frontend-lint, frontend-test, security, docker-build, dependency-audit, secret-scan, dast-scan]
    if: always() && github.ref == 'refs/heads/master' && github.event_name == 'push' && !contains(needs.backend-test.result, 'failure') && !contains(needs.backend-lint.result, 'failure') && !contains(needs.frontend-lint.result, 'failure') && !contains(needs.frontend-test.result, 'failure') && !contains(needs.security.result, 'failure') && !contains(needs.docker-build.result, 'failure') && !contains(needs.dependency-audit.result, 'failure') && !contains(needs.secret-scan.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
