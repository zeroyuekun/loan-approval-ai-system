name: Security

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

# Force Node.js 24 runtime for all JS actions (gitleaks@v2 has no native Node 24 version)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install security tools
        run: pip install bandit
      - name: Bandit SAST scan (Python)
        # Gate fails (exit 1) on issues at severity=HIGH AND confidence=HIGH.
        # Medium-confidence high-severity findings still appear in the JSON
        # report for triage but don't fail CI — this keeps the gate signal
        # strong while surfacing lower-confidence hits for review.
        run: |
          bandit -r backend/apps/ -f json -o bandit-report.json --severity-level high --confidence-level high
          bandit -r backend/apps/ --severity-level high --confidence-level high -f screen
      - name: Upload security report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 30

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit --strict --desc on -r backend/requirements.txt
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Audit npm dependencies (runtime only, high+critical)
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
