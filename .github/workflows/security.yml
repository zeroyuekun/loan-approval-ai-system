name: Security

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

# Force Node.js 24 runtime for all JS actions (gitleaks@v2 has no native Node 24 version)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install security tools
        run: pip install bandit
      - name: Bandit SAST scan (Python)
        run: |
          bandit -r backend/apps/ -f json -o bandit-report.json --severity-level high
          bandit -r backend/apps/ --severity-level high -f screen
      - name: Upload security report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 30

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --desc on
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
