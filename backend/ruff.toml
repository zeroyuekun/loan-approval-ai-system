target-version = "py313"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "S",    # flake8-bandit (security)
]
ignore = [
    "S101",   # assert used (OK in tests)
    "S105",   # hardcoded password (false positives in settings defaults)
    "S106",   # hardcoded password argument
    "S110",   # try-except-pass
    "E501",   # line too long (handled by formatter)
]

[lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106", "S107", "S108", "E402", "B017"]
# Mirror the test-file relaxation for nested test directories (apps/*/tests/)
# — ruff's "tests/**" pattern is glob-anchored to the top-level path. S608 is
# included here because tests legitimately use raw-SQL helpers to seed corrupt
# ciphertext / read raw column bytes via hardcoded column names.
"**/tests/**" = ["S101", "S105", "S106", "S107", "S108", "S608", "E402", "B017"]
"*/migrations/**" = ["E501"]
"*/management/commands/**" = ["S311"]  # random OK for data generation/seeding
"config/settings/**" = ["F405"]  # star imports from base settings

[lint.isort]
known-first-party = ["apps", "config"]
