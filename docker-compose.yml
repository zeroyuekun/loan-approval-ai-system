services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loan_approval}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - internal

  backend:
    build: ./backend
    image: loan-approval-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-loan_approval}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DJANGO_CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend:/app
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 120 --max-requests 1000 --max-requests-jitter 100 --access-logfile -
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready/", "--connect-timeout", "5"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal

  celery_worker_ml:
    image: loan-approval-backend
    build: ./backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    entrypoint: []
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DJANGO_CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
    volumes:
      - ./backend:/app
    # Concurrency 1: training holds a Redis lock so only one run executes at a
    # time anyway, and a single XGBoost+Optuna run already saturates available
    # CPU. Scheduled drift/fairness tasks queue briefly behind training (both
    # are non-latency-sensitive).
    #
    # --max-tasks-per-child=5 recycles the worker process after every 5
    # completed tasks so any accumulated native state (XGBoost/OpenMP threads,
    # Optuna memory, file descriptors) gets cleaned up and zombie tasks cannot
    # run indefinitely past their time_limit.
    command: celery -A config worker -l info -Q ml --concurrency 1 --max-tasks-per-child 5 --prefetch-multiplier 1
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - internal

  celery_worker_io:
    image: loan-approval-backend
    build: ./backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    entrypoint: []
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DJANGO_CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
    volumes:
      - ./backend:/app
    command: celery -A config worker -l info -Q email,agents,celery --concurrency 4
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - internal

  celery_beat:
    image: loan-approval-backend
    build: ./backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    entrypoint: []
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DJANGO_CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
    volumes:
      - ./backend:/app
    command: celery -A config beat -l info
    networks:
      - internal

  watchdog:
    image: loan-approval-backend
    build: ./backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    entrypoint: []
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DJANGO_CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
    volumes:
      - ./backend:/app
    command: python manage.py watchdog --interval 30
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      target: runner
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      WATCHPACK_POLLING: "true"
      # Cap Node heap below the container mem_limit so a runaway
      # Next.js dev-server watch cycle exits gracefully instead of
      # being killed with code 243. See docs/runbooks/frontend-exit-243.md.
      NODE_OPTIONS: "--max-old-space-size=768"
    mem_limit: 1g
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - frontend_next:/app/.next
      - frontend_node_modules:/app/node_modules
    user: root
    command: sh -c "npm ci && npm run dev"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - internal

  # --- Monitoring stack (opt-in via: docker compose --profile monitoring up) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: loan-approval-prometheus
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # grafana moved to docker-compose.monitoring.yml so the main stack parses
  # without forcing GRAFANA_ADMIN_PASSWORD on developers who don't use the
  # monitoring profile. See docker-compose.monitoring.yml for the service.

  loki:
    image: grafana/loki:3.4.2
    container_name: loan-approval-loki
    profiles: ["monitoring"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  promtail:
    image: grafana/promtail:3.4.2
    container_name: loan-approval-promtail
    profiles: ["monitoring"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - internal

  alertmanager:
    image: prom/alertmanager:latest
    container_name: loan-approval-alertmanager
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - internal

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: loan-approval-celery-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:9808:9808"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      CE_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - internal

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: loan-approval-postgres-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-loan_approval}?sslmode=disable"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  loki_data:
  prometheus_data:
  # grafana_data is declared in docker-compose.monitoring.yml
  frontend_next:
  frontend_node_modules:
